<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Catalogue AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <div id="input-section" class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h1 class="text-2xl font-bold mb-4 text-gray-800">Générateur de Produits</h1>
            <p>peux-tu me créer les Pixel 6 avec les couleurs Vert, Bleu, Rouge et les capacités 65Go et 1To. </p>
            <textarea id="userPrompt" class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="Décrivez les produits à créer (modèles, couleurs, capacités...)"></textarea>
            <button onclick="generateProducts()" id="btn-generate" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                Générer la prévisualisation
            </button>
        </div>

        <div id="preview-section" class="hidden bg-white p-6 rounded-xl shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Vérification des données</h2>
                <button onclick="saveToSupabase()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
                    Valider et Enregistrer dans Supabase
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-3 border">Modèle</th>
                            <th class="p-3 border">Couleur</th>
                            <th class="p-3 border">Capacité</th>
                            <th class="p-3 border">Prix</th>
                            <th class="p-3 border w-20">Action</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    let currentProducts = [];
    const WEBHOOK_GENERATE = 'https://anseisdemetz.app.n8n.cloud/webhook-test/f902908a-0183-43b7-a310-3cdd95802150';
    const WEBHOOK_SAVE = 'https://anseisdemetz.app.n8n.cloud/webhook-test/5d77fa87-f210-43a5-9ac8-ca079b7ea16c';

    async function generateProducts() {
        const prompt = document.getElementById('userPrompt').value;
        document.getElementById('preview-section').classList.add('hidden');
        
        try {
            const response = await fetch(WEBHOOK_GENERATE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: prompt })
            });

            const responseData = await response.json(); 
            console.log("1. Réponse n8n reçue :", responseData);

            // On cherche l'élément de type "item" dans le flux streaming
            const itemNode = responseData.find(obj => obj.type === 'item');

            if (!itemNode || !itemNode.content) {
                throw new Error("Aucun contenu trouvé dans la réponse de l'IA.");
            }

            // Le contenu est une chaîne de caractères JSON, on le décode
            // Il ressemble à : "[{\"data\":[...]}]"
            const innerContent = JSON.parse(itemNode.content);
            console.log("2. Contenu interne décodé :", innerContent);

            // On extrait le tableau final (qui est dans la clé 'data' du premier objet)
            let finalProducts = [];
            if (Array.isArray(innerContent) && innerContent[0].data) {
                finalProducts = innerContent[0].data;
            } else {
                // Sécurité si la structure varie légèrement
                finalProducts = innerContent.data || innerContent;
            }

            currentProducts = finalProducts;
            console.log("3. Produits prêts pour le tableau :", currentProducts);

            if (currentProducts.length > 0) {
                renderTable();
                document.getElementById('preview-section').classList.remove('hidden');
            }

        } catch (error) {
            console.error('Erreur :', error);
            alert('Erreur lors de la génération : ' + error.message);
        }
    }

    function renderTable() {
        const tbody = document.getElementById('product-table-body');
        
        if (!tbody) return;
        
        if (currentProducts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">Aucun produit généré.</td></tr>';
            return;
        }

        tbody.innerHTML = currentProducts.map((p, index) => `
            <tr class="hover:bg-gray-50">
                <td class="p-2 border"><input class="w-full p-1" value="${p.modele || ''}" onchange="updateData(${index}, 'modele', this.value)"></td>
                <td class="p-2 border"><input class="w-full p-1" value="${p.couleur || ''}" onchange="updateData(${index}, 'couleur', this.value)"></td>
                <td class="p-2 border"><input class="w-full p-1" value="${p.capacite || ''}" onchange="updateData(${index}, 'capacite', this.value)"></td>
                <td class="p-2 border"><input type="number" class="w-full p-1" value="${p.prix || 100}" onchange="updateData(${index}, 'prix', this.value)"></td>
                <td class="p-2 border text-center">
                    <button onclick="deleteRow(${index})" class="text-red-500 hover:text-red-700">🗑️</button>
                </td>
            </tr>
        `).join('');

        document.getElementById('preview-section').classList.remove('hidden');
    }

    function updateData(index, field, value) {
        currentProducts[index][field] = value;
    }

    function deleteRow(index) {
        currentProducts.splice(index, 1);
        renderTable();
    }

    async function saveToSupabase() {
        if (currentProducts.length === 0) return alert("Rien à enregistrer !");
        if (!confirm(`Voulez-vous vraiment enregistrer ${currentProducts.length} produits ?`)) return;
        
        try {
            const response = await fetch(WEBHOOK_SAVE, {
                method: 'POST',
                body: JSON.stringify({ products: currentProducts }), // On l'envoie dans un objet pour n8n
                headers: { 'Content-Type': 'application/json' }
            });
            
            if (response.ok) {
                alert("Enregistré avec succès !");
                currentProducts = [];
                renderTable();
                location.reload();
            } else {
                alert("Erreur lors de l'enregistrement.");
            }
        } catch (e) {
            alert("Erreur de connexion : " + e.message);
        }
    }
</script>

</body>
</html>
