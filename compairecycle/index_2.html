<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compairecycle | Estimation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #6EE7B7 0%, #3B82F6 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="gradient-bg h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-3xl shadow-2xl overflow-hidden p-8">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Compairecycle</h1>
            <p class="text-sm text-gray-500">Estimation instantanée par IA</p>
        </header>

        <div id="chat-container" class="space-y-4 mb-6 h-80 overflow-y-auto pr-2 text-sm">
            <div class="bg-gray-100 p-3 rounded-2xl rounded-tl-none mr-8">
                Bonjour ! Quel appareil souhaitez-vous revendre aujourd'hui ?
            </div>
        </div>

        <div class="relative">
            <input type="text" id="user-input" 
                class="w-full border-none bg-gray-100 rounded-full px-6 py-3 focus:ring-2 focus:ring-blue-400 outline-none transition-all"
                placeholder="Ex: iPhone 11 128Go...">
            <button onclick="sendMessage()" 
                class="absolute right-2 top-1.5 bg-blue-600 text-white p-1.5 rounded-full hover:bg-blue-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const apiKey = "VF.DM.69a2e4f08371dc9bcfb1d5e8.EU1wvwsDyUDlykEJ"; // REMPLACEZ PAR VOTRE API KEY
        const userID = "user_123"; 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value;
            if (!message) return;

            // Afficher le message utilisateur
            appendMessage(message, 'user');
            input.value = '';

            try {
                const response = await fetch(`https://general-runtime.voiceflow.com/state/user/${userID}/interact`, {
                    method: 'POST',
                    headers: { 'Authorization': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: { type: 'text', payload: message } })
                });

                const data = await response.json();
                
                data.forEach(trace => {
                    if (trace.type === 'speak' || trace.type === 'text') {
                        appendMessage(trace.payload.message, 'bot');
                    }
                });
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        function appendMessage(text, side) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = side === 'user' 
                ? "bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none ml-8 self-end" 
                : "bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tl-none mr-8";
            div.innerHTML = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
