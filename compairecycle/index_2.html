<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compairecycle | Estimation IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; }
        .chat-height { height: 500px; }
        .glass-card { background: white; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .bot-msg { background: #f3f4f6; border-radius: 18px 18px 18px 2px; }
        .user-msg { background: #059669; color: white; border-radius: 18px 18px 2px 18px; }
        /* Animation de pulsation pour l'attente */
        .dot-typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-lg rounded-3xl overflow-hidden flex flex-col">
        <header class="bg-white border-b p-6 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <span class="text-emerald-600">♻️</span> Compairecycle
                </h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">Expertise Instantanée</p>
            </div>
            <div class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse"></div>
        </header>

        <div id="chat-container" class="chat-height overflow-y-auto p-6 space-y-4 bg-white">
            <div class="bot-msg p-4 max-w-[85%] text-gray-700 shadow-sm">
                Bonjour ! Quel appareil souhaitez-vous revendre ? (Précisez le modèle et la capacité)
            </div>
        </div>

        <div id="typing" class="hidden px-6 py-2 text-xs text-gray-400 italic">
            L'IA Compairecycle analyse votre demande...
        </div>

        <div class="p-6 bg-gray-50 border-t">
            <div class="relative flex items-center">
                <input type="text" id="user-input" 
                    onkeypress="if(event.key === 'Enter') sendMessage()"
                    class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-4 pr-14 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all shadow-sm"
                    placeholder="Ex: iPhone 13 Pro 256Go...">
                
                <button onclick="sendMessage()" 
                    class="absolute right-2 bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-xl transition-all shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
            <p class="text-[10px] text-center text-gray-400 mt-4 uppercase">Propulsé par Compairecycle IA Engine</p>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const apiKey = "VF.DM.69a2e4f08371dc9bcfb1d5e8.EU1wvwsDyUDlykEJ"; // <--- METTEZ VOTRE CLÉ ICI
        const userID = "session_" + Math.random().toString(36).substring(7); 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            input.value = '';
            document.getElementById('typing').classList.remove('hidden');

            try {
                const response = await fetch(`https://general-runtime.voiceflow.com/state/user/${userID}/interact`, {
                    method: 'POST',
                    headers: { 'Authorization': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: { type: 'text', payload: message } })
                });

                const data = await response.json();
                document.getElementById('typing').classList.add('hidden');
                
                data.forEach(trace => {
                    if (trace.type === 'speak' || trace.type === 'text') {
                        // Si le message contient un prix, on peut le styliser
                        const msg = trace.payload.message;
                        appendMessage(msg, 'bot');
                    }
                });
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('typing').classList.add('hidden');
                appendMessage("Désolé, j'ai une petite difficulté technique. Recommençons.", 'bot');
            }
        }

        function appendMessage(text, side) {
            const container = document.getElementById('chat-container');
            const wrapper = document.createElement('div');
            wrapper.className = side === 'user' ? "flex justify-end" : "flex justify-start";
            
            const div = document.createElement('div');
            // Style spécial si c'est le prix final (détection simple du symbole €)
            const isPrice = text.includes('€') || text.includes('Prix');
            
            div.className = side === 'user' 
                ? "user-msg p-4 max-w-[85%] shadow-md" 
                : (isPrice ? "bg-emerald-50 border-2 border-emerald-200 p-5 rounded-2xl text-emerald-900 font-bold shadow-sm" : "bot-msg p-4 max-w-[85%] text-gray-700 shadow-sm");
            
            div.innerHTML = text;
            wrapper.appendChild(div);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
