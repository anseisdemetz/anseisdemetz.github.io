<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compairecycle - Estimation Express</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .container { text-align: center; padding: 20px; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenue sur Compairecycle</h1>
        <p>Cliquez sur la bulle en bas à droite pour estimer votre appareil.</p>
    </div>

    </body>

<script>
import { Card, BarChart, Title, Subtitle, Text } from "@tremor/react";

const data = [
  {
    name: "iPhone 17 Pro",
    "Prix Grade A": 950,
  },
  {
    name: "iPhone 17",
    "Prix Grade A": 820,
  },
  {
    name: "Samsung S24 Ultra",
    "Prix Grade A": 780,
  },
  {
    name: "Google Pixel 9",
    "Prix Grade A": 650,
  },
];

const dataFormatter = (number) => {
  return "€ " + Intl.NumberFormat("fr").format(number).toString();
};

export default function PricingDashboard() {
  return (
    <Card className="max-w-xl mx-auto bg-white border-none shadow-lg rounded-2xl">
      <Title className="text-emerald-900 font-bold">Analyse des Valeurs Max</Title>
      <Subtitle className="text-gray-500 italic mb-6">
        Prix de reprise maximum (Grade A) par modèle identifié.
      </Subtitle>
      <BarChart
        className="mt-6 h-72"
        data={data}
        index="name"
        categories={["Prix Grade A"]}
        colors={["emerald"]}
        valueFormatter={dataFormatter}
        yAxisWidth={48}
        showAnimation={true}
      />
      <Text className="mt-4 text-xs text-center text-gray-400 uppercase tracking-widest">
        Données synchronisées en temps réel via Voiceflow API
      </Text>
    </Card>
  );
}
</script>
</html>
